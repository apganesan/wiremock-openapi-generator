openapi: 3.0.3
info:
  title: User Management API
  description: Sample API for demonstrating WireMock stub generation with multiple examples per endpoint.
  version: 1.0.0
  contact:
    name: Example Team
    email: team@example.com

servers:
  - url: http://localhost:8080
    description: Local WireMock server

paths:

  # ── GET /api/users ──────────────────────────────────────────────────────────
  /api/users:
    get:
      operationId: listUsers
      summary: List all users
      tags:
        - users
      responses:
        '200':
          description: A list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                smallList:
                  summary: Two active users
                  value:
                    - id: 1
                      name: Alice Johnson
                      email: alice@example.com
                      role: admin
                      status: active
                      createdAt: "2023-01-15T08:00:00Z"
                      profile:
                        bio: "Platform administrator"
                        location: "New York, USA"
                        website: "https://alice.example.com"
                      permissions:
                        - read
                        - write
                        - admin
                    - id: 2
                      name: Bob Smith
                      email: bob@example.com
                      role: user
                      status: active
                      createdAt: "2023-03-22T10:30:00Z"
                      profile:
                        bio: "Regular developer"
                        location: "Austin, TX"
                        website: ""
                      permissions:
                        - read
                        - write
                largeList:
                  summary: Five users of various roles
                  value:
                    - id: 1
                      name: Alice Johnson
                      email: alice@example.com
                      role: admin
                      status: active
                      createdAt: "2023-01-15T08:00:00Z"
                      profile:
                        bio: "Platform administrator"
                        location: "New York, USA"
                        website: "https://alice.example.com"
                      permissions:
                        - read
                        - write
                        - admin
                    - id: 2
                      name: Bob Smith
                      email: bob@example.com
                      role: user
                      status: active
                      createdAt: "2023-03-22T10:30:00Z"
                      profile:
                        bio: "Regular developer"
                        location: "Austin, TX"
                        website: ""
                      permissions:
                        - read
                        - write
                    - id: 3
                      name: Carol White
                      email: carol@example.com
                      role: moderator
                      status: active
                      createdAt: "2023-05-10T14:00:00Z"
                      profile:
                        bio: "Community moderator"
                        location: "Chicago, IL"
                        website: "https://carol.blog"
                      permissions:
                        - read
                        - write
                        - moderate
                    - id: 4
                      name: Dave Brown
                      email: dave@example.com
                      role: user
                      status: inactive
                      createdAt: "2022-11-01T09:00:00Z"
                      profile:
                        bio: ""
                        location: ""
                        website: ""
                      permissions:
                        - read
                    - id: 5
                      name: Eve Davis
                      email: eve@example.com
                      role: user
                      status: active
                      createdAt: "2024-02-20T16:45:00Z"
                      profile:
                        bio: "Frontend engineer"
                        location: "Seattle, WA"
                        website: "https://evedavis.dev"
                      permissions:
                        - read
                        - write
                emptyList:
                  summary: No users found
                  value: []

    # ── POST /api/users ─────────────────────────────────────────────────────
    post:
      operationId: createUser
      summary: Create a new user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUser'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                regularUser:
                  summary: A newly created regular user
                  value:
                    id: 101
                    name: Frank Miller
                    email: frank@example.com
                    role: user
                    status: active
                    createdAt: "2024-06-01T12:00:00Z"
                    profile:
                      bio: ""
                      location: ""
                      website: ""
                    permissions:
                      - read
                      - write
                adminUser:
                  summary: A newly created admin user
                  value:
                    id: 102
                    name: Grace Lee
                    email: grace@example.com
                    role: admin
                    status: active
                    createdAt: "2024-06-01T12:05:00Z"
                    profile:
                      bio: "System administrator"
                      location: "San Francisco, CA"
                      website: "https://grace.example.com"
                    permissions:
                      - read
                      - write
                      - admin

  # ── /api/users/{id} ─────────────────────────────────────────────────────────
  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of the user

    # ── GET /api/users/{id} ─────────────────────────────────────────────────
    get:
      operationId: getUser
      summary: Get a user by ID
      tags:
        - users
      responses:
        '200':
          description: User found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                normalUser:
                  summary: A standard active user
                  value:
                    id: 1
                    name: Alice Johnson
                    email: alice@example.com
                    role: user
                    status: active
                    createdAt: "2023-01-15T08:00:00Z"
                    profile:
                      bio: "Software engineer"
                      location: "New York, USA"
                      website: "https://alice.example.com"
                    permissions:
                      - read
                      - write
                adminUser:
                  summary: An admin user with all permissions
                  value:
                    id: 2
                    name: Bob Admin
                    email: bob-admin@example.com
                    role: admin
                    status: active
                    createdAt: "2022-06-01T09:00:00Z"
                    profile:
                      bio: "Platform administrator with full access"
                      location: "Boston, MA"
                      website: "https://bob.admin.example.com"
                    permissions:
                      - read
                      - write
                      - admin
                      - delete
                      - manage_users
                inactiveUser:
                  summary: A deactivated user account
                  value:
                    id: 3
                    name: Charlie Inactive
                    email: charlie@example.com
                    role: user
                    status: inactive
                    createdAt: "2021-03-10T07:00:00Z"
                    profile:
                      bio: "Former developer"
                      location: "Denver, CO"
                      website: ""
                    permissions: []
        '404':
          description: User not found.

    # ── PUT /api/users/{id} ─────────────────────────────────────────────────
    put:
      operationId: updateUser
      summary: Update an existing user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUser'
      responses:
        '200':
          description: User updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                updated:
                  summary: Updated user response
                  value:
                    id: 1
                    name: Alice Johnson (Updated)
                    email: alice-updated@example.com
                    role: moderator
                    status: active
                    createdAt: "2023-01-15T08:00:00Z"
                    profile:
                      bio: "Senior software engineer"
                      location: "San Francisco, CA"
                      website: "https://alice-new.example.com"
                    permissions:
                      - read
                      - write
                      - moderate

    # ── DELETE /api/users/{id} ───────────────────────────────────────────────
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags:
        - users
      responses:
        '204':
          description: User deleted successfully. No content returned.

components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
        - role
        - status
      properties:
        id:
          type: integer
          description: Unique user identifier
          example: 1
        name:
          type: string
          description: Full name of the user
          example: Alice Johnson
        email:
          type: string
          format: email
          description: Email address
          example: alice@example.com
        role:
          type: string
          enum:
            - user
            - admin
            - moderator
          description: Role assigned to the user
          example: user
        status:
          type: string
          enum:
            - active
            - inactive
          description: Account status
          example: active
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the account was created
          example: "2023-01-15T08:00:00Z"
        profile:
          $ref: '#/components/schemas/UserProfile'
        permissions:
          type: array
          items:
            type: string
          description: List of permission strings granted to the user
          example:
            - read
            - write

    UserProfile:
      type: object
      properties:
        bio:
          type: string
          description: Short biography
          example: "Software engineer"
        location:
          type: string
          description: City or region
          example: "New York, USA"
        website:
          type: string
          description: Personal website URL
          example: "https://alice.example.com"

    NewUser:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: Frank Miller
        email:
          type: string
          format: email
          example: frank@example.com
        role:
          type: string
          enum:
            - user
            - admin
            - moderator
          default: user
        profile:
          $ref: '#/components/schemas/UserProfile'
