services:
  wiremock:
    image: wiremock/wiremock:3.3.1
    container_name: wiremock-mock-server
    ports:
      - "8080:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    command:
      - --global-response-templating
      - --verbose
      - --root-dir
      - /home/wiremock
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/__admin/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    environment:
      - TZ=UTC
